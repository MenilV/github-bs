name: CI/CD Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Tests
        run: node test.js

      - name: Auto Version Bump
        run: node bump-version.js

      - name: Commit Version Bump
        run: |
          git add manifest.json
          git commit -m "chore(release): bump version [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main

      - name: Zip Extension Files
        run: |
          zip -r github-bs.zip manifest.json content.js styles.css crochet.png icons

      - name: Install Release Dependencies
        run: npm install chrome-webstore-upload

      - name: Upload and Publish to Chrome Web Store
        run: node release.js
        env:
          EXTENSION_ID: ${{ secrets.EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}

