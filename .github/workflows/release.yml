name: CI/CD Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Tests
        run: node test.js

      - name: Auto Version Bump
        run: node bump-version.js

      - name: Commit Version Bump
        run: |
          git add manifest.json
          git commit -m "chore(release): bump version [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Zip Extension Files
        run: |
          zip -r github-bs.zip manifest.json content.js styles.css crochet.png icons

      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: github-bs.zip
          extension-id: ${{ secrets.EXTENSION_ID }}
          client-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}
          refresh-token: ${{ secrets.REFRESH_TOKEN }}
          publish: true

